<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bilingual Biology Flashcards</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      min-height: 100vh;
      padding: 20px;
    }
    h1 {
      text-align: center;
      font-size: 2em;
      margin-bottom: 10px;
      text-shadow: 0 0 10px rgba(255,255,255,0.3);
    }
    .subtitle {
      text-align: center;
      color: #aaa;
      margin-bottom: 20px;
      font-size: 0.95em;
    }
    .lang-toggle {
      text-align: center;
      margin-bottom: 20px;
    }
    .lang-toggle button {
      padding: 8px 24px;
      margin: 0 8px;
      border: 2px solid #ffd700;
      background: transparent;
      color: #ffd700;
      border-radius: 30px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
      font-size: 1em;
    }
    .lang-toggle button.active {
      background: #ffd700;
      color: #1a1a2e;
    }
    .lang-toggle button:hover {
      transform: scale(1.05);
    }
    .progress-bar {
      width: 100%;
      height: 8px;
      background: #333;
      border-radius: 4px;
      margin-bottom: 20px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #00d4aa, #00b4d8);
      width: 0%;
      transition: width 0.3s ease;
    }
    .controls {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      font-weight: bold;
      font-size: 0.9em;
      transition: all 0.2s;
    }
    .btn:hover { transform: scale(1.05); }
    .btn-prev { background: #e63946; color: white; }
    .btn-flip { background: #f4a261; color: #1a1a2e; }
    .btn-next { background: #2a9d8f; color: white; }
    .btn-shuffle { background: #9b5de5; color: white; }
    .btn-filter {
      padding: 6px 14px;
      border-radius: 15px;
      font-size: 0.8em;
      border: 2px solid;
      background: transparent;
      cursor: pointer;
    }
    .filter-active { background: rgba(255,255,255,0.2); }

    .flashcard-container {
      perspective: 1000px;
      max-width: 700px;
      margin: 0 auto 20px;
      height: 600px;
    }
    .flashcard {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.6s;
      cursor: pointer;
    }
    .flashcard.flipped { transform: rotateY(180deg); }
    .card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 20px;
      padding: 25px;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }
    .card-front {
      background: linear-gradient(145deg, #2d3436, #000000);
      border: 3px solid;
    }
    .card-back {
      background: linear-gradient(145deg, #1e3a5f, #0d2137);
      transform: rotateY(180deg);
      border: 3px solid;
    }

    .topic-science .card-front, .topic-science .card-back { border-color: #f4a261; }
    .topic-cell .card-front, .topic-cell .card-back { border-color: #2a9d8f; }
    .topic-genetics .card-front, .topic-genetics .card-back { border-color: #e63946; }
    .topic-evolution .card-front, .topic-evolution .card-back { border-color: #9b5de5; }
    .topic-ecology .card-front, .topic-ecology .card-back { border-color: #00d4aa; }
    .topic-human .card-front, .topic-human .card-back { border-color: #ff6b6b; }

    .topic-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 0.75em;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
      align-self: flex-start;
    }
    .badge-science { background: #f4a261; color: #1a1a2e; }
    .badge-cell { background: #2a9d8f; color: white; }
    .badge-genetics { background: #e63946; color: white; }
    .badge-evolution { background: #9b5de5; color: white; }
    .badge-ecology { background: #00d4aa; color: #1a1a2e; }
    .badge-human { background: #ff6b6b; color: white; }

    .card-question {
      font-size: 1.3em;
      font-weight: bold;
      line-height: 1.4;
      margin-bottom: 15px;
    }
    .card-answer {
      font-size: 1em;
      line-height: 1.6;
      color: #e0e0e0;
    }
    .card-answer strong { color: #ffd700; }
    .card-answer ul { margin-left: 20px; margin-top: 8px; }
    .card-answer li { margin-bottom: 6px; }

    .card-image {
      width: 100%;
      max-height: 250px;
      object-fit: contain;
      border-radius: 10px;
      margin: 15px 0;
      background: rgba(255,255,255,0.05);
    }
    .card-image-front {
      width: 100%;
      max-height: 200px;
      object-fit: contain;
      border-radius: 10px;
      margin: 10px 0;
      background: rgba(255,255,255,0.05);
    }

    .hint-box {
      background: rgba(255,255,255,0.1);
      border-left: 4px solid #ffd700;
      padding: 10px 15px;
      border-radius: 0 8px 8px 0;
      margin-top: 10px;
      font-size: 0.9em;
      color: #ffd700;
    }

    .card-counter {
      text-align: center;
      color: #888;
      font-size: 0.9em;
      margin-top: 10px;
    }

    .quick-ref {
      max-width: 700px;
      margin: 30px auto;
      background: rgba(255,255,255,0.05);
      border-radius: 15px;
      padding: 20px;
    }
    .quick-ref h2 {
      color: #ffd700;
      margin-bottom: 15px;
      font-size: 1.2em;
    }
    .quick-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 15px;
    }
    .quick-item {
      background: rgba(0,0,0,0.3);
      padding: 12px;
      border-radius: 10px;
      border-left: 4px solid;
    }
    .quick-item h4 { color: #ffd700; margin-bottom: 5px; font-size: 0.95em; }
    .quick-item p { font-size: 0.85em; color: #ccc; line-height: 1.5; }

    .star-rating {
      display: flex;
      gap: 5px;
      margin-top: 15px;
      justify-content: center;
    }
    .star {
      font-size: 1.5em;
      cursor: pointer;
      color: #444;
      transition: color 0.2s;
    }
    .star.active { color: #ffd700; }
    .star:hover { color: #ffd700; }

    @media (max-width: 600px) {
      .flashcard-container { height: 650px; }
      .card-question { font-size: 1.1em; }
      .card-answer { font-size: 0.9em; }
      h1 { font-size: 1.5em; }
    }
  </style>
</head>
<body>

<h1 id="mainTitle">🌱 Biology Level 1 · Flashcards</h1>
<p class="subtitle" id="subtitle">Click card to flip · Bilingual (EN/SV)</p>

<div class="lang-toggle">
  <button id="btnEn" class="active" onclick="setLanguage('en')">🇬🇧 English</button>
  <button id="btnSv" onclick="setLanguage('sv')">🇸🇪 Svenska</button>
</div>

<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

<div class="controls" id="filterControls">
  <button class="btn btn-filter filter-active" onclick="filterCards('all', this)" style="border-color:#fff;color:#fff;" data-key="filterAll">All</button>
  <button class="btn btn-filter" onclick="filterCards('science', this)" style="border-color:#f4a261;color:#f4a261;" data-key="filterScience">Science</button>
  <button class="btn btn-filter" onclick="filterCards('cell', this)" style="border-color:#2a9d8f;color:#2a9d8f;" data-key="filterCell">Cell</button>
  <button class="btn btn-filter" onclick="filterCards('genetics', this)" style="border-color:#e63946;color:#e63946;" data-key="filterGenetics">Genetics</button>
  <button class="btn btn-filter" onclick="filterCards('evolution', this)" style="border-color:#9b5de5;color:#9b5de5;" data-key="filterEvolution">Evolution</button>
  <button class="btn btn-filter" onclick="filterCards('ecology', this)" style="border-color:#00d4aa;color:#00d4aa;" data-key="filterEcology">Ecology</button>
  <button class="btn btn-filter" onclick="filterCards('human', this)" style="border-color:#ff6b6b;color:#ff6b6b;" data-key="filterHuman">Human</button>
</div>

<div class="controls">
  <button class="btn btn-prev" onclick="prevCard()" data-key="prev">Previous</button>
  <button class="btn btn-flip" onclick="flipCard()" data-key="flip">Flip</button>
  <button class="btn btn-next" onclick="nextCard()" data-key="next">Next</button>
  <button class="btn btn-shuffle" onclick="shuffleCards()" data-key="shuffle">Shuffle</button>
</div>

<div class="flashcard-container" onclick="flipCard()">
  <div class="flashcard" id="flashcard">
    <div class="card-face card-front" id="cardFront">
      <span class="topic-badge" id="frontBadge">SCIENCE</span>
      <div class="card-question" id="frontQuestion">Loading...</div>
      <img class="card-image-front" id="frontImage" src="" alt="" style="display:none;">
      <div class="hint-box" id="hintBox">Click to see the answer</div>
    </div>
    <div class="card-face card-back" id="cardBack">
      <span class="topic-badge" id="backBadge">SCIENCE</span>
      <div class="card-answer" id="backAnswer">Loading...</div>
      <img class="card-image" id="backImage" src="" alt="" style="display:none;">
      <div class="star-rating">
        <span class="star" onclick="rateCard(1)">★</span>
        <span class="star" onclick="rateCard(2)">★</span>
        <span class="star" onclick="rateCard(3)">★</span>
        <span class="star" onclick="rateCard(4)">★</span>
        <span class="star" onclick="rateCard(5)">★</span>
      </div>
    </div>
  </div>
</div>

<p class="card-counter" id="cardCounter">1 / 40</p>

<div class="quick-ref" id="quickRef">
  <h2 id="quickTitle">📘 QUICK REFERENCE · 2-Minute Summary</h2>
  <div class="quick-grid" id="quickGrid"></div>
</div>

// --------------------------------------------------------------
// STATE
// --------------------------------------------------------------
let currentLang = 'en';
let currentIndex = 0;
let filteredCards = [...cardData];
let cardRatings = new Array(cardData.length).fill(0);
let currentFilter = 'all';

// --------------------------------------------------------------
// DOM refs
// --------------------------------------------------------------
const flashcard = document.getElementById('flashcard');
const frontBadge = document.getElementById('frontBadge');
const backBadge = document.getElementById('backBadge');
const frontQuestion = document.getElementById('frontQuestion');
const backAnswer = document.getElementById('backAnswer');
const frontImage = document.getElementById('frontImage');
const backImage = document.getElementById('backImage');
const cardCounter = document.getElementById('cardCounter');
const progressFill = document.getElementById('progressFill');
const hintBox = document.getElementById('hintBox');
const quickGrid = document.getElementById('quickGrid');
const mainTitle = document.getElementById('mainTitle');
const subtitle = document.getElementById('subtitle');

// --------------------------------------------------------------
// LANGUAGE STRINGS
// --------------------------------------------------------------
const langText = {
  en: {
    title: '🌱 Biology Level 1 · Flashcards',
    subtitle: 'Click card to flip · Bilingual (EN/SV)',
    hint: 'Click to see the answer',
    filterAll: 'All',
    filterScience: 'Science',
    filterCell: 'Cell',
    filterGenetics: 'Genetics',
    filterEvolution: 'Evolution',
    filterEcology: 'Ecology',
    filterHuman: 'Human',
    prev: 'Previous',
    flip: 'Flip',
    next: 'Next',
    shuffle: 'Shuffle',
    quickTitle: '📘 QUICK REFERENCE · 2-Minute Summary'
  },
  sv: {
    title: '🌱 Biologi Nivå 1 · Flashcards',
    subtitle: 'Klicka på kortet för att vända · Tvåspråkig (EN/SV)',
    hint: 'Klicka för att se svaret',
    filterAll: 'Alla',
    filterScience: 'Vetenskap',
    filterCell: 'Cell',
    filterGenetics: 'Genetik',
    filterEvolution: 'Evolution',
    filterEcology: 'Ekologi',
    filterHuman: 'Människan',
    prev: 'Föregående',
    flip: 'Vänd',
    next: 'Nästa',
    shuffle: 'Blanda',
    quickTitle: '📘 SNABBREFERENS · 2-minuters sammanfattning'
  }
};

// --------------------------------------------------------------
// FUNCTIONS
// --------------------------------------------------------------
function setLanguage(lang) {
  currentLang = lang;
  document.getElementById('btnEn').classList.toggle('active', lang === 'en');
  document.getElementById('btnSv').classList.toggle('active', lang === 'sv');
  
  // Update UI texts
  const t = langText[lang];
  mainTitle.textContent = t.title;
  subtitle.textContent = t.subtitle;
  hintBox.textContent = t.hint;
  document.getElementById('quickTitle').textContent = t.quickTitle;
  
  // Filter buttons
  document.querySelectorAll('.btn-filter').forEach(btn => {
    const key = btn.dataset.key;
    if (key) btn.textContent = t[key];
  });
  document.querySelectorAll('.controls .btn:not(.btn-filter)').forEach(btn => {
    const key = btn.dataset.key;
    if (key) btn.textContent = t[key];
  });
  
  // Quick reference
  buildQuickRef(lang);
  
  // Update card content
  updateCard();
}

function buildQuickRef(lang) {
  const data = quickRefData[lang];
  quickGrid.innerHTML = '';
  data.forEach(item => {
    const div = document.createElement('div');
    div.className = 'quick-item';
    div.style.borderColor = '#ffd700';
    div.innerHTML = `<h4>${item.title}</h4><p>${item.items}</p>`;
    quickGrid.appendChild(div);
  });
}

function getCardText(card) {
  return card[currentLang] || card.en; // fallback
}

function updateCard() {
  if (filteredCards.length === 0) {
    frontQuestion.textContent = 'No cards match filter.';
    backAnswer.textContent = 'Try another filter.';
    cardCounter.textContent = '0 / 0';
    progressFill.style.width = '0%';
    frontImage.style.display = 'none';
    backImage.style.display = 'none';
    flashcard.classList.remove('flipped');
    return;
  }
  
  const card = filteredCards[currentIndex];
  const text = getCardText(card);
  
  // Update badges
  const topicMap = {
    science: { en: 'SCIENCE', sv: 'VETENSKAP' },
    cell: { en: 'CELL', sv: 'CELL' },
    genetics: { en: 'GENETICS', sv: 'GENETIK' },
    evolution: { en: 'EVOLUTION', sv: 'EVOLUTION' },
    ecology: { en: 'ECOLOGY', sv: 'EKOLOGI' },
    human: { en: 'HUMAN', sv: 'MANNISKAN' }
  };
  const badgeText = topicMap[card.topic]?.[currentLang] || card.topic.toUpperCase();
  const badgeClass = 'badge-' + card.topic;
  frontBadge.className = 'topic-badge ' + badgeClass;
  frontBadge.textContent = badgeText;
  backBadge.className = 'topic-badge ' + badgeClass;
  backBadge.textContent = badgeText;
  
  // Update content
  frontQuestion.textContent = text.question;
  backAnswer.innerHTML = text.answer;
  
  // Images - all removed, hide them
  frontImage.style.display = 'none';
  backImage.style.display = 'none';
  
  // Topic class for border
  flashcard.className = 'flashcard topic-' + card.topic;
  document.getElementById('cardFront').className = 'card-face card-front topic-' + card.topic;
  document.getElementById('cardBack').className = 'card-face card-back topic-' + card.topic;
  
  // Counter & progress
  cardCounter.textContent = (currentIndex + 1) + ' / ' + filteredCards.length;
  const progress = ((currentIndex + 1) / filteredCards.length) * 100;
  progressFill.style.width = progress + '%';
  
  // Reset flip
  flashcard.classList.remove('flipped');
  
  // Stars
  updateStars();
}

function flipCard() {
  flashcard.classList.toggle('flipped');
}

function nextCard() {
  if (filteredCards.length === 0) return;
  currentIndex = (currentIndex + 1) % filteredCards.length;
  updateCard();
}

function prevCard() {
  if (filteredCards.length === 0) return;
  currentIndex = (currentIndex - 1 + filteredCards.length) % filteredCards.length;
  updateCard();
}

function shuffleCards() {
  for (let i = filteredCards.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [filteredCards[i], filteredCards[j]] = [filteredCards[j], filteredCards[i]];
  }
  currentIndex = 0;
  updateCard();
}

function filterCards(topic, btn) {
  currentFilter = topic;
  document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('filter-active'));
  if (btn) btn.classList.add('filter-active');
  
  if (topic === 'all') {
    filteredCards = [...cardData];
  } else {
    filteredCards = cardData.filter(c => c.topic === topic);
  }
  currentIndex = 0;
  updateCard();
}

function rateCard(rating) {
  cardRatings[currentIndex] = rating;
  updateStars();
}

function updateStars() {
  const stars = document.querySelectorAll('.star');
  const rating = cardRatings[currentIndex] || 0;
  stars.forEach((star, i) => {
    star.classList.toggle('active', i < rating);
  });
}

// Keyboard
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight') nextCard();
  if (e.key === 'ArrowLeft') prevCard();
  if (e.key === ' ' || e.key === 'Enter') flipCard();
});

// --------------------------------------------------------------
// INIT
// --------------------------------------------------------------
buildQuickRef('en');
setLanguage('en');
</script>
